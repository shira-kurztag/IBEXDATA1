<div class="aaa">
    <div class="card" dir="rtl">
      <p-breadcrumb [model]="breadcrumbItems">מאגר נתונים - רשימת בנקים
        ></p-breadcrumb>
      <h3 style="color: #0db1ae; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">מאגר נתונים - רשימת בנקים</h3>
     
      <button class="toggle-button" (click)="toggleEditMode()">
        {{ editMode ? 'שמירה' : 'עריכה' }}
      </button>
      <button class="xxx">🖊</button>
      <input type="text" [(ngModel)]="searchText" placeholder="         חפש                " class="toggle-button1">
      <button class="vvv" (click)="searchBanks()">🔍</button>
  
      <div *ngIf="editMode" class="new-bank-input">
        <div class="sss">
        <input type="text" [(ngModel)]="newBank.bankText" style="max-width: 200px;
        border-color: #c0e4e4;
        color: #000;
        resize: none;
        border-radius: 4px;
        height: 40px;
        vertical-align: middle;
        border-style: solid;
        border-width: 1px;">
        <div class="www">
        <button style="    background-color: #0db1ae;
        border: 0;
        border-radius: 9px;
        height: 37px;
        /* font-size: 62%; */
        width: 6%;
        text-align: center;
        display: block;
        position: absolute;
        top: 251px;
        left: 769px;" (click)="addBank()">הוסף בנק</button></div>
      </div>
      </div>
      
      <div class="new-bank-input">
        <!-- <input type="text" [(ngModel)]="searchText" placeholder="הכנס אות לחיפוש" (input)="searchBanks()" style="max-width: 200px; border-color: #c0e4e4; color: #000; resize: none; border-radius: 4px; height: 40px; vertical-align: middle; border-style: solid; border-width: 1px;"> -->
      </div>
      
      <div class="bank-list">
        <div *ngFor="let bank of filteredBanks" class="bank-item">
          <ng-container *ngIf="editingBank && editingBank.bankId === bank.bankId; else viewMode">
            <input [(ngModel)]="editingBank.bankText" placeholder="שם הבנק">
            <!-- <button (click)="saveBank()">שמירה</button>
            <button (click)="cancelEditing()">ביטול</button> -->
            <p-button icon="pi pi-check" styleClass="p-button-rounded p-button-success p-button-outlined" (click)="saveBank()"></p-button>
            <p-button icon="pi pi-times" styleClass="p-button-rounded p-button-danger p-button-outlined" (click)="cancelEditing()"></p-button>
          </ng-container>
          <ng-template #viewMode>
            {{ bank.bankText }}
            <div *ngIf="editMode" class="bank-actions">
              <p-button icon="pi pi-pencil" styleClass="p-button-rounded p-button-success p-button-outlined" (click)="startEditingBank(bank)"></p-button>
              <p-button icon="pi pi-trash" styleClass="p-button-rounded p-button-danger p-button-outlined" (click)="deleteBank(bank)"></p-button>
            </div>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
