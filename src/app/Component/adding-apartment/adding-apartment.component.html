<div class="container">
  <h2>Add New Apartment</h2>
  <form (ngSubmit)="onSubmit()">
    <!-- <div class="form-group">
      <label for="buildingId">ApartmentId</label>
      <input type="number" class="form-control" id="buildingId" [(ngModel)]="newApartment.ApartmentId" name="ApartmentId">
    </div> -->
    <div class="form-group">
      <label for="apartmentStatus">סטטוס</label>
      <input type="number" class="form-control" id="apartmentStatus" [(ngModel)]="newApartment.apartmentStatus" name="apartmentStatus" required>
    </div>
    <div class="form-group">
      <label for="apartmentNumberByContract">מספר דירה לפי חוזה</label>
      <input type="number" class="form-control" id="apartmentNumberByContract" [(ngModel)]="newApartment.apartmentNumberByContract" name="apartmentNumberByContract" required>
    </div>
    <div class="form-group">
      <label for="floor">קומה</label>
      <input type="number" class="form-control" id="floor" [(ngModel)]="newApartment.floor" name="floor">
    </div>
    <div class="form-group">
      <label for="apartmentSurfaceByContract">שטח דירה לפי חוזה</label>
      <input type="number" class="form-control" id="apartmentSurfaceByContract" [(ngModel)]="newApartment.apartmentSurfaceByContract" name="apartmentSurfaceByContract">
    </div>
    <div class="form-group">
      <label for="linkagesApartments">סוג הצמדה:</label>
      <select class="form-control" id="linkagesApartments" [(ngModel)]="newApartment.linkagesApartments" name="linkagesApartments" required>
        <!-- <option value="">בחר סוג הצמדה</option> -->
        <option value="חניה">חניה</option>
        <option value="מחסן">מחסן</option>
        <option value="גג">גג</option>
        <option value="מרתף">מרתף</option>
      </select>
    </div>
    <div class="form-group">
      <label for="apartmentNumberByAddress">כתובת עירונית</label>
      <input type="text" class="form-control" id="apartmentNumberByAddress" [(ngModel)]="newApartment.apartmentNumberByAddress" name="apartmentNumberByAddress">
    </div>
    <div class="form-group">
      <label for="isDetachedApartment">האם דירה צמודה לקרקע</label>
      <input type="checkbox" class="form-control" id="isDetachedApartment" [(ngModel)]="newApartment.isDetachedApartment" name="isDetachedApartment" required>
    </div>
    <div class="form-group">
      <label for="isCompanyHasCompletedCommitments">האם השלים התחיבויות לחברה</label>
      <input type="checkbox" class="form-control" id="isCompanyHasCompletedCommitments" [(ngModel)]="newApartment.isCompanyHasCompletedCommitments" name="isCompanyHasCompletedCommitments" required>
    </div>
    <div class="form-group">
      <label for="isGivenPossessionOfTheApartment">נמסרה החזרה בדירה</label>
      <input type="checkbox" class="form-control" id="isGivenPossessionOfTheApartment" [(ngModel)]="newApartment.isGivenPossessionOfTheApartment" name="isGivenPossessionOfTheApartment" required>
    </div>
    <div class="form-group">
      <label for="isProducedLease">הופק חוזה חכירה</label>
      <input type="text" class="form-control" id="isProducedLease" [(ngModel)]="newApartment.isProducedLease" name="isProducedLease">
    </div>
    <button type="submit" class="btn btn-primary">Add</button>
  </form>
</div>
